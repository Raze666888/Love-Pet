        /* User Avatar Area */
        header .user-nav-link {

            border: 1px solid #e9ecef;
            padding: 6px 12px !important;
            border-radius: 25px;
        }
        header .user-nav-link:hover {
            background: var(--bs-primary) !important;
            border-color: var(--bs-primary) !important;
            color: #fff !important;
        }
        header .user-nav-link .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.5);
        }
        header .user-nav-link .user-icon {
            width: 28px;
            height: 28px;
            background: var(--bs-secondary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        header .user-nav-link .username {
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Search Bar */
        header .search-bar {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 25px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }
        header .search-bar:hover,
        header .search-bar:focus-within {
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 3px rgba(107, 178, 82, 0.15);
        }
        header .search-bar-content {
            color: var(--bs-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Mobile Toggle Button */
        header .navbar-toggler {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 8px 12px;
        }
        header .navbar-toggler:focus {
            box-shadow: 0 0 0 3px rgba(107, 178, 82, 0.2);
        }

        /* Responsive Adjustments */
        @media (max-width: 991px) {
            header .nav-link {
                padding: 12px 16px !important;
                border-radius: 8px;
            }
            header .user-nav-link {
                border-radius: 8px;
                margin-top: 4px;
            }
        }

        /* Navigation Hover Effect Line */
        header .nav-item::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--bs-primary);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        header .nav-item:hover::after {
            width: 60%;
        }
        header .nav-item.ai-health::after {
            display: none;
        }
    </style>

 <script src="/static/webSite/js/jquery-1.11.0.min.js"></script>

 <script src="/static/webSite/js/swiper-bundle.js"></script>
 <script crossorigin="anonymous"
         integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
 <script src="/static/webSite/js/plugins.js"></script>
 <script src="/static/webSite/js/script.js"></script>
 <script src="/static/hAdmin/js/plugins/toastr/toastr.min.js"></script>
 <script src="/static/js/GloJs.js"></script>
 <script src="https://unpkg.com/element-ui/lib/index.js"></script>

 <script>

     new Vue({
         el: "#app",
         data() {
             return {
                 baseUrl: gloRequestUrl,

                 likeList: [],
                 fileList: [],
                 fileStr: [],
                 userInfo: {},
                 total: 0,
                 searchKey: "",
                 activeName: "second",
                 loading: true,
                 userId: localStorage.getItem("userId"),
                 role: localStorage.getItem("role"),
                 form: {},
                 chongzhiopen: false,
                 openMsg: false,
                 openDetail: false,
                 queryParams: {
                     pageSize: 3,
                     pageNum: 1,
                 },
                 title: "",
                 rules: {
                     title: [
                         {required: true, message: 'Please enter', trigger: 'blur'},

                     ],

                 }
             }
         },
         methods: {
             handleResetQuery() {
                 this.queryParams = {
                     pageSize: 3,
                     pageNum: 1,
                 }
                 this.getList()
             },

             handleClick(tab){
                 let that = this
                 console.log(tab.$props.name)
                     that.getmoneyList()

             },

             submitEdit() {
                 let that = this
                 this.$refs['form'].validate((valid) => {
                     if (valid) {
                         if (that.fileStr && that.fileStr.length > 0) {
                             that.form.img = that.fileStr.join(",")
                         }
                         that.form.userid = that.userId
                         $.ajax({
                             url: that.baseUrl + "/tmoney",
                             type: "POST",
                             data: JSON.stringify(that.form),
                             contentType: "application/json",
                             // headers: { 'Content-Type': 'application/json;charset=utf-8' },
                             success: function (data) {
                                 that.open = false
                                 if (data.code === 200) {
                                     toastr.success(data.msg, 'Notice')
that.chongzhiopen = false
                                     that.getmoneyList()
                                 } else {

                                     toastr.error(data.msg, 'Notice')
                                 }
                                 that.getList()
                             },
                             error: function () {
                                 alert("Server error! Network error!")
                             }
                         })
                     }
                 })
             },
             // Get recharge list
             getmoneyList() {
                 let that = this;
                 that.loading = true
                 $.ajax({
                     url: that.baseUrl + "/tmoney",
                     type: "GET",
                     data: {
                         pageNum:1,
                         pageSize:999,
                         userid:that.userId
                     },
                     success: function (data) {
                         if (data.code !== 500) {
                             that.loading = false
                             that.likeList = data.list
                             that.total = data.total
                         }
                     },
                     error: function () {
                         windowsAuto(500, "Server error! Network error!")
                     }
                 });
             },

             reset() {
                 this.form = {}
                 this.fileStr = []
                 this.fileList = []
             },

             handleChongzhi(){
               this.chongzhiopen = true
             },
             handleEditUserInfo() {
                 let that = this
                 that.form = that.userInfo
                 that.open = true
                 that.title = "Edit"
             },
             handleEdit(row) {
                 let that = this
                 that.form = row
                 that.openMsg = true
                 that.title = "Reply"
             },


             removeElement(arr, elem) {
                 return arr.filter(item => item !== elem);
             },
             handleRemove(file, fileList) {
                 this.fileStr = this.removeElement(this.fileStr, file.response.msg)
             },

             beforeRemove(file, fileList) {
                 return this.$confirm(`Are you sure to remove ${file.name}?`);
             },
             handleFileSuccess(res) {
                 let that = this
                 that.fileStr.push(res.msg)
             },
             handleLogout(){
                 let that = this
                 $.ajax({
                     url: that.baseUrl + "/admin/logout",
                     type: "get",
                     data: {

                     },
                     success: function (data) {

                         localStorage.removeItem("userId")
                         window.location.href = that.baseUrl + "/login"


                     },
                     error: function () {
                         alert("Server error! Network error!")
                     }
                 })
             }
         },
         watch: {},
         mounted() {
             let that = this;

             that.getmoneyList()

         }
     })

 </script>
