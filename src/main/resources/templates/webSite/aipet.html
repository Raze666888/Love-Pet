<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物健康AI助手 - 宠物服务平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* 顶部导航栏 - 与项目其他页面保持一致 */
        .top-bar {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar h3 {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        .top-bar a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .top-bar a:hover { color: #1E9FFF; }

        /* 聊天主体 */
        .chat-wrapper {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px);
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px 25px;
            text-align: center;
        }
        .chat-header h2 { margin: 0; font-size: 20px; font-weight: 600; }
        .chat-header p { margin: 5px 0 0; font-size: 13px; opacity: 0.9; }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            margin-bottom: 15px;
            word-wrap: break-word;
            line-height: 1.6;
            font-size: 14px;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-left: auto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            margin-right: auto;
            background: #fff;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }

        /* 打字指示器 */
        .typing-indicator {
            display: none;
            margin-right: auto;
            background: #fff;
            padding: 14px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            margin-bottom: 15px;
        }
        .typing-indicator.active { display: flex; gap: 5px; }
        .typing-indicator span {
            width: 7px; height: 7px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 快捷问题 */
        .quick-area {
            padding: 12px 20px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quick-btn {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            padding: 6px 14px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #667eea; }
        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 25px;
            padding: 10px 28px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .disclaimer {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #999;
            background: #fafafa;
        }

        @media (max-width: 600px) {
            .chat-wrapper { margin: 10px; height: calc(100vh - 70px); }
            .message { max-width: 88%; }
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
    <h3>宠物健康AI助手</h3>
    <a th:href="@{/web/userindex}">返回首页</a>
</div>

<!-- 聊天主体 -->
<div class="chat-wrapper">
    <div class="chat-header">
        <h2>宠物健康AI助手</h2>
        <p>随时为您解答宠物健康问题</p>
    </div>

    <div class="chat-messages" id="chatMessages">
        <!-- 欢迎消息 -->
        <div class="message ai">
            <strong>您好！我是您的宠物健康助手</strong><br><br>
            我可以帮您解答关于宠物健康、饮食、行为等方面的问题。<br><br>
            <strong>常见咨询：</strong>
            <ul style="margin:8px 0;padding-left:20px;">
                <li>狗狗/猫咪的饮食建议</li>
                <li>疫苗接种和驱虫问题</li>
                <li>常见症状分析</li>
                <li>行为问题解答</li>
            </ul>
            <strong>注意：</strong>紧急情况请立即联系兽医！
        </div>
    </div>

    <!-- 打字指示器 -->
    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <!-- 快捷问题 -->
    <div class="quick-area">
        <button class="quick-btn" onclick="sendQuick('狗狗呕吐怎么办？')">狗狗呕吐</button>
        <button class="quick-btn" onclick="sendQuick('猫咪不吃东西是什么原因？')">猫咪不吃东西</button>
        <button class="quick-btn" onclick="sendQuick('宠物疫苗接种时间表')">疫苗时间</button>
        <button class="quick-btn" onclick="sendQuick('狗狗拉肚子怎么处理？')">拉肚子</button>
        <button class="quick-btn" onclick="sendQuick('狗狗可以吃什么水果？')">饮食建议</button>
        <button class="quick-btn" onclick="sendQuick('狗狗总是乱叫怎么办？')">行为问题</button>
    </div>

    <!-- 输入区域 -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="userInput"
               placeholder="请输入您的宠物健康问题..."
               onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <div class="disclaimer">
        本AI助手仅供参考，不能替代专业兽医诊断。紧急情况请立即就医！
    </div>
</div>

<script>
    var conversationHistory = [];
    var chatMessages = document.getElementById('chatMessages');
    var userInput = document.getElementById('userInput');
    var sendBtn = document.getElementById('sendBtn');
    var typingIndicator = document.getElementById('typingIndicator');

    function sendMessage() {
        var message = userInput.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        userInput.value = '';

        showTyping();
        sendBtn.disabled = true;

        // 调用后端API
        fetch('/aipet/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: message,
                conversationHistory: conversationHistory
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            hideTyping();
            sendBtn.disabled = false;

            if (data.success) {
                addMessage(data.answer, 'ai');
                conversationHistory.push(
                    { role: 'user', content: message },
                    { role: 'assistant', content: data.answer }
                );
                // 保留最近10轮对话
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }
            } else {
                addMessage('抱歉，我暂时无法回答您的问题，请稍后再试。', 'ai');
            }
        })
        .catch(function(err) {
            hideTyping();
            sendBtn.disabled = false;
            addMessage('网络错误，请检查连接后重试。', 'ai');
            console.error('Error:', err);
        });
    }

    function sendQuick(question) {
        userInput.value = question;
        sendMessage();
    }

    function addMessage(text, sender) {
        var div = document.createElement('div');
        div.className = 'message ' + sender;
        // 简单Markdown处理
        div.innerHTML = text
            .replace(/\n\n/g, '<br><br>')
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
        typingIndicator.classList.add('active');
        chatMessages.appendChild(typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
        typingIndicator.classList.remove('active');
    }

    window.onload = function() { userInput.focus(); };
</script>
</body>
</html>
