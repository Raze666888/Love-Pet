name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # 只运行单元测试（排除集成测试）
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Run unit tests
      run: mvn clean test -Dtest="*Test" -DexcludedGroups="integration" -Dspring.profiles.active=test

  # 打包构建（跳过所有测试，因为测试已在单独步骤完成）
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    # 打包项目，跳过测试
    - name: Package with Maven
      run: mvn clean package -DskipTests

    # 上传 jar 包到 CI 产物，方便下载
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-java-project-jar
        path: target/*.jar